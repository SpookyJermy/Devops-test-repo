name: CI Pipline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up node.Js
      uses: actions/setup-node@v3
      with:
        node-version: '16'
    
    - name: Install dependenciesq
      run: npm install

    - name: Run tests
      run: npm test
